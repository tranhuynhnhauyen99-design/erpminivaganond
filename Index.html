<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ERP Bakery – The Vagabond Pâtisserie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F2EA; --panel:#FFFFFF; --ink:#241C13; --muted:#7A6E5D;
  --line:#E6DECF; --side:#231710; --side-ink:#D9CDBB; --side-dim:#8C7C66;
  --accent:#A85F14; --accent-soft:#F3E4CC; --amber:#E0A93E;
  --ok:#3D7A4E; --ok-bg:#E4F0E7; --warn:#B07A0F; --warn-bg:#F8EDD2;
  --bad:#B3402F; --bad-bg:#F7E1DC; --radius:10px;
  --font-ui:'Be Vietnam Pro',system-ui,sans-serif; --font-display:'Fraunces',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-ui);background:var(--bg);color:var(--ink);font-size:14px}

/* ===== Sidebar: sơ đồ điều hướng ERP ===== */
.side{position:fixed;inset:0 auto 0 0;width:250px;background:var(--side);color:var(--side-ink);
  display:flex;flex-direction:column;z-index:40;transition:transform .25s}
.side-head{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.side-head .brand{font-family:var(--font-display);font-weight:700;font-size:19px;color:#F2E7D5;line-height:1.2}
.side-head .sub{font-size:11px;color:var(--side-dim);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
.nav{flex:1;overflow-y:auto;padding:10px 0 20px}
.nav-group{padding:14px 18px 4px;font-size:10.5px;letter-spacing:.14em;color:var(--side-dim);text-transform:uppercase}
.nav a{display:flex;align-items:center;gap:10px;padding:8px 18px;color:var(--side-ink);text-decoration:none;
  font-size:13.5px;border-left:3px solid transparent}
.nav a .n{font-size:15px;color:var(--side-dim);width:20px;text-align:center;flex:none}
.nav a:hover{background:rgba(255,255,255,.05)}
.nav a.active{background:rgba(224,169,62,.13);border-left-color:var(--amber);color:#F5EBDA}
.nav a.active .n{color:var(--amber)}
.side-foot{padding:12px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:12px}
.side-foot a{color:var(--amber);text-decoration:none}

/* ===== Main ===== */
.main{margin-left:250px;min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 24px;background:var(--panel);
  border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
.topbar h1{font-family:var(--font-display);font-weight:700;font-size:21px;display:flex;align-items:center;gap:8px}
.topbar h1 .n{color:var(--accent);font-size:19px}
.spacer{flex:1}
.search{position:relative}
.search input{width:230px;padding:8px 12px 8px 32px;border:1px solid var(--line);border-radius:8px;
  font-family:inherit;font-size:13px;background:var(--bg)}
.search::before{content:'⌕';position:absolute;left:10px;top:6px;color:var(--muted);font-size:16px}
.btn{border:0;border-radius:8px;padding:9px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#8F500F}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.btn-ghost:hover{color:var(--ink)}
.burger{display:none;background:none;border:0;font-size:22px;cursor:pointer;color:var(--ink)}

.content{padding:22px 24px 60px;flex:1}
.hint{color:var(--muted);font-size:12.5px;margin-bottom:14px}

/* ===== Dashboard ===== */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:14px;margin-bottom:26px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
.kpi .lb{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);display:flex;gap:6px;align-items:center}
.kpi .val{font-family:var(--font-display);font-weight:700;font-size:26px;margin-top:8px;font-variant-numeric:tabular-nums}
.kpi.good .val{color:var(--ok)} .kpi.warn .val{color:var(--bad)} .kpi.money .val{color:var(--accent)}
.dash-cols{display:grid;grid-template-columns:1.4fr 1fr;gap:18px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.card h2{font-family:var(--font-display);font-size:16px;font-weight:700;padding:14px 18px;border-bottom:1px solid var(--line)}
.updated{font-size:12px;color:var(--muted);margin:10px 2px}

/* ===== Table ===== */
.table-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:auto;max-height:calc(100vh - 180px)}
table{border-collapse:collapse;width:100%;font-size:13px}
thead th{position:sticky;top:0;background:#FBF8F1;border-bottom:2px solid var(--line);
  padding:9px 12px;text-align:left;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);white-space:nowrap;z-index:5}
tbody td{padding:8px 12px;border-bottom:1px solid #F0EADD;white-space:nowrap;font-variant-numeric:tabular-nums}
tbody tr:hover{background:#FBF7EE}
td.num{text-align:right}
.chip{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.chip.ok{background:var(--ok-bg);color:var(--ok)}
.chip.warn{background:var(--warn-bg);color:var(--warn)}
.chip.bad{background:var(--bad-bg);color:var(--bad)}
.row-del{background:none;border:0;cursor:pointer;color:#C9BBA5;font-size:15px;padding:2px 6px;border-radius:6px}
.row-del:hover{color:var(--bad);background:var(--bad-bg)}
.empty{padding:40px;text-align:center;color:var(--muted)}
.count{font-size:12.5px;color:var(--muted)}

/* ===== Modal form ===== */
.overlay{position:fixed;inset:0;background:rgba(30,20,10,.45);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:6vh 16px}
.overlay.open{display:flex}
.modal{background:var(--panel);border-radius:14px;width:100%;max-width:520px;max-height:86vh;overflow:auto;box-shadow:0 24px 60px rgba(30,20,10,.3)}
.modal h3{font-family:var(--font-display);font-size:18px;padding:18px 22px 4px}
.modal .note{font-size:12.5px;color:var(--muted);padding:0 22px 10px}
.modal form{padding:8px 22px 22px;display:grid;gap:13px}
.fld label{display:block;font-size:12.5px;font-weight:600;margin-bottom:5px}
.fld label .req{color:var(--bad)}
.fld input,.fld select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13.5px;background:#FDFCF9}
.fld input:focus,.fld select:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
.modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}

/* ===== Toast & loading ===== */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#F5EFE3;
  padding:11px 20px;border-radius:10px;font-size:13.5px;z-index:80;display:none;max-width:90vw}
.toast.err{background:var(--bad)}
.loading{padding:60px;text-align:center;color:var(--muted)}
.spin{display:inline-block;width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--accent);
  border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle;margin-right:10px}
@keyframes sp{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.spin{animation:none}}

@media (max-width:900px){
  .side{transform:translateX(-100%)}
  .side.open{transform:none;box-shadow:0 0 0 100vmax rgba(0,0,0,.35)}
  .main{margin-left:0}
  .burger{display:block}
  .search input{width:140px}
  .dash-cols{grid-template-columns:1fr}
  .content{padding:16px 12px 60px}
}
</style>
</head>
<body>

<aside class="side" id="side">
  <div class="side-head">
    <div class="brand">🍰 ERP Bakery</div>
    <div class="sub">The Vagabond Pâtisserie</div>
  </div>
  <nav class="nav" id="nav">
    <a href="#" data-view="dashboard" class="active"><span class="n">⑮</span> Báo Cáo &amp; Dashboard</a>
  </nav>
  <div class="side-foot"><a id="sheetLink" href="#" target="_blank" rel="noopener">Mở Google Sheet ↗</a></div>
</aside>

<div class="main">
  <header class="topbar">
    <button class="burger" id="burger" aria-label="Menu">☰</button>
    <h1 id="pageTitle"><span class="n">⑮</span> Báo Cáo &amp; Dashboard</h1>
    <div class="spacer"></div>
    <div class="search" id="searchBox" style="display:none"><input id="searchInput" placeholder="Tìm trong bảng…"></div>
    <button class="btn btn-ghost" id="btnRefresh">↻ Tải lại</button>
    <button class="btn btn-primary" id="btnAdd" style="display:none">＋ Thêm dòng</button>
  </header>
  <main class="content" id="content">
    <div class="loading"><span class="spin"></span>Đang kết nối Google Sheet…</div>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle">Thêm dòng</h3>
    <div class="note" id="modalNote">Các cột công thức (CT) sẽ tự động tính trên sheet.</div>
    <form id="addForm"></form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var VIEW_ONLY = <?!= viewOnly ?>;
var META = null, LOOKUPS = null, CURRENT = 'dashboard', CACHE = {};

function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function toast(msg,err){var t=$('toast');t.textContent=msg;t.className='toast'+(err?' err':'');t.style.display='block';clearTimeout(t._h);t._h=setTimeout(function(){t.style.display='none';},3500);}
function loading(msg){$('content').innerHTML='<div class="loading"><span class="spin"></span>'+esc(msg||'Đang tải…')+'</div>';}
function fail(e){toast((e&&e.message)?e.message:'Có lỗi xảy ra. Thử tải lại.',true);$('content').innerHTML='<div class="empty">Không tải được dữ liệu. Bấm ↻ Tải lại để thử lại.</div>';}

/* ---------- Khởi động ---------- */
window.addEventListener('load',function(){
  google.script.run.withSuccessHandler(function(meta){
    META=meta;
    if(VIEW_ONLY){
      var foot=$('sheetLink').parentNode;
      foot.innerHTML='👁 Chế độ chỉ xem';
    }else{
      $('sheetLink').href=meta.sheetUrl;
    }
    buildNav();
    show('dashboard');
    if(!VIEW_ONLY)google.script.run.withSuccessHandler(function(lk){LOOKUPS=lk;}).getLookups();
  }).withFailureHandler(fail).getMeta();
});

function buildNav(){
  var nav=$('nav'), html='', group='';
  META.modules.forEach(function(m){
    if(m.group!==group){group=m.group;html+='<div class="nav-group">'+esc(group)+'</div>';}
    html+='<a href="#" data-view="'+m.key+'"><span class="n">'+m.num+'</span> '+esc(m.title)+'</a>';
  });
  html+='<div class="nav-group">BÁO CÁO</div>'+
        '<a href="#" data-view="dashboard" class="active"><span class="n">⑮</span> Báo Cáo &amp; Dashboard</a>';
  nav.innerHTML=html;
  nav.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click',function(ev){ev.preventDefault();show(a.dataset.view);$('side').classList.remove('open');});
  });
}

$('burger').addEventListener('click',function(){$('side').classList.toggle('open');});
$('btnRefresh').addEventListener('click',function(){delete CACHE[CURRENT];show(CURRENT,true);
  if(CURRENT!=='dashboard'){google.script.run.withSuccessHandler(function(lk){LOOKUPS=lk;}).getLookups();}});
$('searchInput').addEventListener('input',function(){filterTable(this.value);});
$('btnAdd').addEventListener('click',openForm);
$('overlay').addEventListener('click',function(e){if(e.target===this)closeForm();});

/* ---------- Điều hướng ---------- */
function show(view,force){
  CURRENT=view;
  document.querySelectorAll('.nav a').forEach(function(a){a.classList.toggle('active',a.dataset.view===view);});
  $('searchInput').value='';
  if(view==='dashboard'){
    $('pageTitle').innerHTML='<span class="n">⑮</span> Báo Cáo &amp; Dashboard';
    $('searchBox').style.display='none';$('btnAdd').style.display='none';
    if(CACHE.dashboard&&!force){renderDashboard(CACHE.dashboard);return;}
    loading('Đang tổng hợp báo cáo…');
    google.script.run.withSuccessHandler(function(d){CACHE.dashboard=d;renderDashboard(d);}).withFailureHandler(fail).getDashboard();
  }else{
    var m=modOf(view);
    $('pageTitle').innerHTML='<span class="n">'+m.num+'</span> '+esc(m.title);
    $('searchBox').style.display='';
    $('btnAdd').style.display=VIEW_ONLY?'none':'';
    if(CACHE[view]&&!force){renderTable(CACHE[view]);return;}
    loading('Đang đọc sheet '+m.title+'…');
    google.script.run.withSuccessHandler(function(d){CACHE[view]=d;renderTable(d);}).withFailureHandler(fail).getModule(view);
  }
}
function modOf(key){for(var i=0;i<META.modules.length;i++)if(META.modules[i].key===key)return META.modules[i];return null;}

/* ---------- Dashboard ---------- */
function renderDashboard(d){
  var h='<div class="kpis">';
  d.kpis.forEach(function(k){
    h+='<div class="kpi '+k.tone+'"><div class="lb">'+k.icon+' '+esc(k.label)+'</div><div class="val">'+esc(k.value)+'</div></div>';
  });
  h+='</div><div class="dash-cols">';
  h+='<div class="card"><h2>🏆 Top Sản Phẩm</h2><div style="overflow:auto"><table><thead><tr><th>Tên Bánh</th><th>Nhóm</th><th>SL Bán</th><th>DT Thuần</th><th>LN Gộp</th></tr></thead><tbody>';
  if(!d.top.length)h+='<tr><td colspan="5" class="empty">Chưa có dữ liệu bán hàng</td></tr>';
  d.top.forEach(function(t){h+='<tr><td>'+esc(t.ten)+'</td><td>'+esc(t.nhom)+'</td><td class="num">'+esc(t.sl)+'</td><td class="num">'+esc(t.dt)+'</td><td class="num">'+esc(t.ln)+'</td></tr>';});
  h+='</tbody></table></div></div>';
  h+='<div class="card"><h2>⚠️ Cảnh Báo Tồn Kho NVL</h2><div style="overflow:auto"><table><thead><tr><th>Mã</th><th>Tên NVL</th><th>Tồn Cuối</th><th>Trạng Thái</th></tr></thead><tbody>';
  if(!d.alerts.length)h+='<tr><td colspan="4" class="empty">🟢 Không có cảnh báo — kho ổn</td></tr>';
  d.alerts.forEach(function(a){h+='<tr><td>'+esc(a.ma)+'</td><td>'+esc(a.ten)+'</td><td class="num">'+esc(a.ton)+'</td><td>'+chip(a.trangThai)+'</td></tr>';});
  h+='</tbody></table></div></div></div>';
  h+='<div class="updated">Cập nhật lúc '+esc(d.updatedAt)+' — số liệu đọc trực tiếp từ sheet 15 – Báo Cáo.</div>';
  $('content').innerHTML=h;
}

/* ---------- Bảng module ---------- */
function chip(v){
  var s=String(v);
  if(s.indexOf('🔴')>=0)return '<span class="chip bad">'+esc(s)+'</span>';
  if(s.indexOf('🟡')>=0||s.indexOf('🟠')>=0)return '<span class="chip warn">'+esc(s)+'</span>';
  if(s.indexOf('🟢')>=0||s.indexOf('✅')>=0)return '<span class="chip ok">'+esc(s)+'</span>';
  return esc(s);
}
function isNumLike(s){return /^-?[\d.,%\s]+$/.test(String(s).trim())&&/\d/.test(s);}

function renderTable(d){
  var canDel=d.deletable&&!VIEW_ONLY;
  var h='<div class="hint"><span class="count">'+d.rows.length+' dòng</span>'+(VIEW_ONLY?' — chế độ chỉ xem.':' — các cột (CT) là công thức, tự tính trên sheet.')+'</div>';
  h+='<div class="table-wrap"><table id="dataTable"><thead><tr>';
  d.headers.forEach(function(th){h+='<th>'+esc(th)+'</th>';});
  if(canDel)h+='<th></th>';
  h+='</tr></thead><tbody>';
  if(!d.rows.length)h+='<tr><td colspan="'+(d.headers.length+1)+'" class="empty">'+(VIEW_ONLY?'Chưa có dữ liệu':'Chưa có dữ liệu — bấm ＋ Thêm dòng để bắt đầu')+'</td></tr>';
  d.rows.forEach(function(row){
    h+='<tr>';
    row.v.forEach(function(c){
      var s=String(c);
      if(s.indexOf('🔴')>=0||s.indexOf('🟡')>=0||s.indexOf('🟢')>=0||s.indexOf('🟠')>=0||s.indexOf('✅')>=0){h+='<td>'+chip(s)+'</td>';}
      else h+='<td'+(isNumLike(s)?' class="num"':'')+'>'+esc(s)+'</td>';
    });
    if(canDel)h+='<td><button class="row-del" title="Xoá dòng" onclick="delRow('+row.r+')">✕</button></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  $('content').innerHTML=h;
  filterTable($('searchInput').value);
}
function filterTable(q){
  var t=$('dataTable');if(!t)return;
  q=q.toLowerCase();
  t.querySelectorAll('tbody tr').forEach(function(tr){
    tr.style.display=(!q||tr.textContent.toLowerCase().indexOf(q)>=0)?'':'none';
  });
}

function delRow(row){
  var m=modOf(CURRENT);
  if(!confirm('Xoá dòng '+row+' trên sheet "'+m.title+'"? Thao tác này không hoàn tác được.'))return;
  loading('Đang xoá dòng…');
  google.script.run.withSuccessHandler(function(d){
    CACHE[CURRENT]=d;renderTable(d);toast('Đã xoá dòng.');
  }).withFailureHandler(function(e){fail(e);}).deleteRecord(CURRENT,row);
}

/* ---------- Form thêm dòng ---------- */
function openForm(){
  var m=modOf(CURRENT);if(!m)return;
  $('modalTitle').textContent='＋ '+m.title;
  $('modalNote').textContent=(m.hasAuto?'Mã sẽ được sinh tự động. ':'')+'Các cột (CT) tự tính bằng công thức trên sheet.';
  var f=$('addForm'),h='';
  m.fields.forEach(function(fd,i){
    var req=fd.required?'<span class="req"> *</span>':'';
    h+='<div class="fld"><label>'+esc(fd.label)+req+'</label>';
    var dv=fd.defaultValue!==undefined?String(fd.defaultValue):'';
    if(fd.type==='select'){
      h+='<select name="'+fd.col+'"'+(fd.required?' required':'')+'><option value="">— chọn —</option>';
      (LOOKUPS&&LOOKUPS[fd.lookup]||[]).forEach(function(o){h+='<option value="'+esc(o.value)+'">'+esc(o.label)+'</option>';});
      h+='</select>';
    }else if(fd.type==='datalist'){
      h+='<input name="'+fd.col+'" list="dl'+i+'" value="'+esc(dv)+'" placeholder="'+esc(fd.placeholder||'')+'"><datalist id="dl'+i+'">';
      (LOOKUPS&&LOOKUPS[fd.lookup]||[]).forEach(function(o){h+='<option value="'+esc(o.value)+'">';});
      h+='</datalist>';
    }else if(fd.type==='date'){
      var today=new Date(),iso=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
      h+='<input type="date" name="'+fd.col+'" value="'+iso+'">';
    }else if(fd.type==='number'){
      h+='<input type="number" step="any" name="'+fd.col+'" value="'+esc(dv)+'"'+(fd.required?' required':'')+' placeholder="'+esc(fd.placeholder||'')+'">';
    }else{
      h+='<input type="text" name="'+fd.col+'" value="'+esc(dv)+'"'+(fd.required?' required':'')+' placeholder="'+esc(fd.placeholder||'')+'">';
    }
    h+='</div>';
  });
  h+='<div class="actions"><button type="button" class="btn btn-ghost" onclick="closeForm()">Huỷ</button>'+
     '<button type="submit" class="btn btn-primary" id="btnSave">Lưu vào sheet</button></div>';
  f.innerHTML=h;
  f.onsubmit=submitForm;
  $('overlay').classList.add('open');
}
function closeForm(){$('overlay').classList.remove('open');}

function submitForm(ev){
  ev.preventDefault();
  var m=modOf(CURRENT),data={},f=$('addForm');
  m.fields.forEach(function(fd){
    var el=f.elements[fd.col];
    if(el&&String(el.value).trim()!=='')data[fd.col]=el.value;
  });
  var btn=$('btnSave');btn.disabled=true;btn.textContent='Đang lưu…';
  google.script.run.withSuccessHandler(function(d){
    CACHE[CURRENT]=d;closeForm();renderTable(d);toast('Đã thêm dòng vào "'+m.title+'".');
    // master data thay đổi → làm mới danh sách dropdown
    google.script.run.withSuccessHandler(function(lk){LOOKUPS=lk;}).getLookups();
  }).withFailureHandler(function(e){
    btn.disabled=false;btn.textContent='Lưu vào sheet';
    toast((e&&e.message)||'Lưu thất bại — thử lại.',true);
  }).addRecord(CURRENT,data);
}
</script>
</body>
</html>
