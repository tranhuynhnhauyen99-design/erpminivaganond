<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ERP Bakery — The Vagabond Pâtisserie</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
<style>
  html,body{height:100%;margin:0}
  body{display:flex;align-items:center;justify-content:center;background:#231710;
    font-family:'Be Vietnam Pro',system-ui,sans-serif;color:#D9CDBB;text-align:center}
  .box{padding:24px}
  h1{font-family:'Fraunces',serif;font-size:30px;color:#F2E7D5;margin:0 0 6px}
  .sub{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#8C7C66;margin-bottom:26px}
  .spin{width:26px;height:26px;border:3px solid #4a3a29;border-top-color:#E0A93E;border-radius:50%;
    margin:0 auto 16px;animation:s .8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  a{color:#E0A93E}
  .fallback{font-size:13px;margin-top:8px}
</style>
</head>
<body>
<div class="box">
  <div class="spin"></div>
  <h1>🍰 ERP Bakery</h1>
  <div class="sub">The Vagabond Pâtisserie</div>
  <div class="fallback">Đang mở ứng dụng… nếu không tự chuyển, <a id="go" href="#">bấm vào đây</a>.</div>
</div>
<script>
  var APP = 'https://script.google.com/macros/s/AKfycbyFxy9ucnTJ5n-NsC3JJjqAQSjsSEhMjxF_E0CLhHXss0Wfh_MqsQunydPKjO5CTjkr/exec';
  var url = APP + (location.search || '');
  document.getElementById('go').href = url;
  location.replace(url);
</script>
</body>
</html>
